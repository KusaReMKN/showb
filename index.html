<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電力メータ</title>
<link rel="stylesheet" href="./index.css">
<script defer src="./index.js"></script>
</head>
<body>
<header>
<h1>電力メータ</h1>
</header>
<main>
<section>
<h2>最新の値</h2>
<p id="current">
最新の値を表示するには JavaScript が必要です。
</p>
<form>
<input type="checkbox" id="autoupdate">
<label for="autoupdate">自動で更新する</label>
</form>
</section>
<h2>瞬時電力の推移</h2>
<section>
<h3>直近 24 時間</h3>
<div>
<img id="daygraph" src="./daygraph.sh" alt="瞬時電力"
	width="1024" height="256" loading="lazy" decoding="async">
</section>
<section>
<h3>直近 1 週間</h3>
<div>
<img id="weekgraph" src="./weekgraph.sh" alt="瞬時電力"
	width="1024" height="256" loading="lazy" decoding="async">
</section>
<section>
<h3>全期間</h3>
<div>
<img id="graph" src="./graph.sh" alt="瞬時電力"
	width="1024" height="256" loading="lazy" decoding="async">
</div>
</section>
</main>
<footer>
<p>

</p>
</footer>
</body>
</html>
